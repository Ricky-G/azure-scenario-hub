name: Feature Request
description: Propose a new scenario or a focused improvement to an existing one
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Search the current catalog and existing issues first. New contributions must have a clear Azure or Microsoft AI engineering connection.

  - type: dropdown
    id: scenario-type
    attributes:
      label: Scenario or Change Type
      options:
        - New Deployable scenario
        - New Runnable Demo
        - New Benchmark
        - New Investigation
        - Existing scenario enhancement
        - Documentation or website improvement
        - CI, validation, or security improvement
    validations:
      required: true

  - type: input
    id: azure-connection
    attributes:
      label: Azure or Microsoft AI Connection
      description: Which Azure service, Microsoft AI framework, or engineering behavior does this address?
      placeholder: ex. Azure API Management, Microsoft Agent Framework, AKS networking
    validations:
      required: true

  - type: textarea
    id: problem-description
    attributes:
      label: Problem Description
      description: What specific engineering question, failure mode, or learning gap should this solve?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the smallest complete scenario or change that would solve the problem.
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation and Evidence
      description: How should the result be tested or proven? Include expected evidence, thresholds, or success criteria.
    validations:
      required: true

  - type: textarea
    id: cost-and-limits
    attributes:
      label: Cost, Prerequisites, and Limitations
      description: Identify expected Azure cost, required permissions/quotas, regional constraints, and known production-hardening gaps.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or examples about the feature request

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched the current catalog and existing issues for duplicates
          required: true
        - label: The request is focused on one Azure or Microsoft AI engineering problem
          required: true
