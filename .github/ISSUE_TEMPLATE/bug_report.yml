name: Bug Report
description: Report a reproducible problem with a scenario, demo, benchmark, or investigation
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Azure Scenario Hub. Do not include credentials, subscription IDs, private certificates, customer data, or other sensitive information. Report security vulnerabilities privately through the repository Security tab.

  - type: input
    id: scenario
    attributes:
      label: Scenario
      description: Which scenario or top-level repository feature is affected?
      placeholder: ex. Azure OpenAI Realtime Transcription
    validations:
      required: true

  - type: dropdown
    id: scenario-type
    attributes:
      label: Scenario Type
      options:
        - Deployable
        - Runnable Demo
        - Benchmark
        - Investigation
        - Legacy Support
        - Repository documentation or website
    validations:
      required: true

  - type: input
    id: azure-region
    attributes:
      label: Azure Region or Offline
      description: Which Azure region was used, or does the scenario run fully offline?
      placeholder: ex. eastus2, swedencentral, or offline

  - type: dropdown
    id: execution-method
    attributes:
      label: Execution Method
      description: How did you deploy or run the scenario?
      options:
        - Azure CLI
        - Azure PowerShell
        - Azure Developer CLI (azd)
        - Terraform
        - Python
        - .NET
        - Jupyter or Verso notebook
        - Test or benchmark harness
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, relevant CLI/runtime/SDK versions, Azure service tier or model deployment, and authentication method. Do not include secrets.
      placeholder: |
        OS: Windows 11
        Runtime: Python 3.11
        Authentication: Azure CLI / Entra ID
        Azure service/model: ...
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the actual behavior and the documented behavior you expected.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide the smallest clean-environment reproduction you can.
      placeholder: |
        1. Run command '...'
        2. See error '...'
        3. Expected '...' but got '...'
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste relevant output after removing all sensitive information.
      render: shell

  - type: textarea
    id: attempted
    attributes:
      label: Validation and Troubleshooting Attempted
      description: Which documented checks, tests, cleanup/redeploy steps, or alternative environments have you tried?

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have removed any sensitive information from logs/screenshots
          required: true
        - label: This is not a security vulnerability; security issues are reported privately
          required: true
