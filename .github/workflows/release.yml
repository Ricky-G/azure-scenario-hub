name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        run: |
          # Get the latest tag matching our vX.Y pattern
          LATEST_TAG=$(git tag -l 'v*' --sort=-version:refname | head -1)

          if [ -z "$LATEST_TAG" ]; then
            # No tags exist yet — start at v0.1
            NEXT_VERSION="v0.1"
          else
            echo "Latest tag: $LATEST_TAG"
            # Strip the 'v' prefix and split into major.minor
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)

            # Increment minor by 1
            NEXT_MINOR=$((MINOR + 1))

            # Roll over at .25 → next major .0
            if [ "$NEXT_MINOR" -gt 25 ]; then
              MAJOR=$((MAJOR + 1))
              NEXT_MINOR=0
            fi

            NEXT_VERSION="v${MAJOR}.${NEXT_MINOR}"
          fi

          echo "tag=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "📦 Next release version: $NEXT_VERSION"

      - name: Generate release notes
        id: notes
        run: |
          # Get the previous tag (if any)
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — generating notes from all commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          else
            echo "Previous tag: $PREV_TAG"
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Build release body
          {
            echo "body<<RELEASE_EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...${{ steps.version.outputs.tag }}"
            echo "RELEASE_EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: true
          make_latest: "true"
